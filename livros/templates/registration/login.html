<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Acesso - Livraria</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f7fc, #e1ebf5);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .login-container {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-container h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #005a79;
        }

        .login-container form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .login-container label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            text-align: left;
        }

        .login-container input {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 10px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        .login-container input:focus {
            outline: none;
            border-color: #008eb1;
            box-shadow: 0 0 4px rgba(0, 139, 177, 0.4);
        }

        .login-container .error-messages {
            background-color: #f8d7da;
            color: #842029;
            border: 1px solid #f5c2c7;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .login-container button {
            background-color: #005a79;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-container button:hover {
            background-color: #003c53;
        }

        .login-container .links {
            margin-top: 15px;
        }

        .login-container .links a {
            color: #005a79;
            text-decoration: none;
            font-size: 14px;
        }

        .login-container .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Bem Vindo à Área de Acesso</h1>

        <form method="post">
            {% csrf_token %}
            
            <!-- Campo de nome do utilizador -->
            <label for="id_username">Nome do Utilizador:</label>
            <input type="text" name="username" id="id_username" required>

            <!-- Campo de senha -->
            <label for="id_password">Senha:</label>
            <input type="password" name="password" id="id_password" required>

            <!-- Se houver erro de autenticação, mostre uma mensagem -->
            {% if form.errors %}
                <div class="error-messages">
                    <p><strong>Utilizador ou senha inválidos.</strong></p>
                </div>
            {% endif %}
            
            <!-- Botão de login -->
            <button type="submit">Entrar</button>
        </form>

        <div class="links">
            <!-- Link para recuperação de senha -->
            <a href="{% url 'password_reset' %}">Esqueceu a senha?</a>
        </div>
    </div>
</body>
</html>
