<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Livro: {{ livro.titulo }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f7fc, #e1ebf5);
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: #005a79;
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #008eb1;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }

        main {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #005a79;
            font-size: 24px;
            border-bottom: 2px solid #008eb1;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form label {
            font-weight: bold;
            margin-top: 10px;
            color: #005a79;
        }

        form input, form select, form textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            margin-top: 5px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: #005a79;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #003c53;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .button-container a {
            display: inline-block;
            background-color: #005a79;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 4px;
            font-size: 16px;
            transition: background-color 0.3s ease;
            margin: 5px;
        }

        .button-container a:hover {
            background-color: #003c53;
        }
    </style>
</head>
<body>

<header>
    <h1>Editar Livro: {{ livro.titulo }}</h1>
</header>

<main>
    <h2>Atualize os detalhes do livro</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Guardar Alterações</button>
    </form>

    <div class="button-container">
        <a href="{% url 'livros:detalhes_livro' livro.id %}">Voltar aos detalhes do livro</a>

    </div>
</main>

</body>
</html>
