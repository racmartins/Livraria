<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ livro.titulo }} - Detalhes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f7fc, #e1ebf5);
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: #005a79;
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #008eb1;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        main h2 {
            color: #005a79;
            font-size: 24px;
            border-bottom: 2px solid #008eb1;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        main p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        main p strong {
            color: #005a79;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .button-container a {
            display: inline-block;
            background-color: #005a79;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
            transition: background-color 0.3s ease;
            margin: 5px;
        }

        .button-container a:hover {
            background-color: #003c53;
        }
    </style>
</head>
<body>

<header>
    <h1>{{ livro.titulo }}</h1>
</header>

<main>
    <h2>Detalhes do Livro</h2>
    <p><strong>Autor:</strong> {{ livro.autor }}</p>
    <p><strong>ISBN:</strong> {{ livro.isbn }}</p>
    <p><strong>Categoria:</strong> {{ livro.categoria }}</p>
    <p><strong>Publicado em:</strong> {{ livro.data_publicacao }}</p>

    <div class="button-container">
        <a href="{% url 'livros:listar_livros' %}">Voltar à Lista de Livros</a>    
    </div>
</main>

</body>
</html>
