<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registar Livro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f4f7fc, #e1ebf5);
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: #005a79;
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #008eb1;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
        }

        main {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        form {
            display: flex;
            flex-direction: column;
        }

        form label {
            font-weight: bold;
            margin-top: 10px;
            color: #005a79;
        }

        form input, form select, form textarea {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            margin-top: 5px;
            width: 100%; /* Faz os inputs ocuparem toda a largura disponível */
            box-sizing: border-box; /* Garante que padding não afete a largura */
        }

        button {
            background-color: #005a79;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #003c53;
        }

        .button-container {
            text-align: center;
            margin-top: 20px;
        }

        .button-container a {
            display: inline-block;
            background-color: #005a79;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 16px;
            transition: background-color 0.3s ease;
            margin: 5px;
        }

        .button-container a:hover {
            background-color: #003c53;
        }
    </style>
</head>
<body>

<header>
    <h1>Registar Livro</h1>
</header>

<main>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Registar</button>
    </form>

    <div class="button-container">
        <a href="{% url 'livros:listar_livros' %}">Voltar à Lista de Livros</a>
    </div>
</main>

</body>
</html>
